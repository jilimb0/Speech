services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: speech
      POSTGRES_USER: speech
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-speech_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speech"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://speech:${POSTGRES_PASSWORD:-speech_dev}@db:5432/speech
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WEB_APP_URL: ${WEB_APP_URL:-https://jilimb0.github.io/Speech}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://jilimb0.github.io}
      HOST: "0.0.0.0"
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
