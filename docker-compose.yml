services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: speech
      POSTGRES_USER: speech
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-speech_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speech"]
      interval: 5s
      timeout: 3s
      retries: 5

  faster-whisper:
    image: lscr.io/linuxserver/faster-whisper:latest
    ports:
      - "8001:10300"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Tbilisi
      - WHISPER_MODEL=small
      - WHISPER_LANG=ru
      - WHISPER_BEAM=3
      - WHISPER_COMPUTE_TYPE=int8
    volumes:
      - whisper-data:/config
      - audio-tmp:/audio-tmp
    restart: unless-stopped

  http-bridge:
    build: services/http-bridge
    ports:
      - "8002:8000"
    environment:
      WHISPER_HOST: faster-whisper
      WHISPER_PORT: 10300
    volumes:
      - audio-tmp:/audio-tmp
    depends_on:
      faster-whisper:
        condition: service_started

  api:
    build: .
    ports:
      - "3006:3000"
    environment:
      DATABASE_URL: postgres://speech:${POSTGRES_PASSWORD:-speech_dev}@db:5432/speech
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SPEECH_PROVIDER: faster-whisper
      FASTER_WHISPER_URL: http://http-bridge:8000
      WEB_APP_URL: ${WEB_APP_URL:-https://jilimb0.github.io/Speech/}
      DEV_MODE: 'true'
      CORS_ORIGIN: ${CORS_ORIGIN:-https://jilimb0.github.io}
      HOST: "0.0.0.0"
      PORT: "3000"
    volumes:
      - /home/jilimb0/speech-web-dist:/app/web-miniapp:ro
    depends_on:
      db:
        condition: service_healthy
      http-bridge:
        condition: service_started

volumes:
  pgdata:
  whisper-data:
  audio-tmp:
