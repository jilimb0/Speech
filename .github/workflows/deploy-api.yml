name: Deploy API to Fly.io

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'services/**'
      - 'Dockerfile'
      - 'fly.toml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
